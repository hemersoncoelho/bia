
[functions.uazapi-connector]
enabled = true
# verify_jwt = false: gateway rejeitava JWT com 401; a função valida auth internamente
verify_jwt = false
import_map = "./functions/uazapi-connector/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/uazapi-connector/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/uazapi-connector/*.html" ]
